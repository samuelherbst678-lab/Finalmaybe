<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Konklave Pro Fix</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

/* ===== PAPAM ===== */
.papam {
    display: none;
    background: gold;
    padding: 10px;
    font-weight: bold;
}

/* ===== KARTEN ===== */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.card {
    width: 170px;
    background: white;
    border: 1px solid #aaa;
    position: relative;
    padding-bottom: 5px;
}

.img {
    height: 120px;
    background: #ddd;
    background-size: cover;
}

/* kleines X */
.delete-btn {
    position:absolute;
    top:2px;
    right:3px;
    font-size:10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

.name {
    font-weight: bold;
}

.row {
    display:flex;
    justify-content: space-between;
    padding:2px 5px;
    font-size:12px;
}

/* Ausrichtung größer */
.type {
    display:flex;
    align-items:center;
    justify-content:center;
    height:18px;
    font-size:11px;
    font-weight:bold;
    color:white;
    margin:3px;
}

/* ===== MATRIX ===== */
table {
    border-collapse: collapse;
    margin:auto;
    background:white;
}

th,td {
    border:1px solid #aaa;
    padding:6px;
}

input {
    width:60px;
    text-align:center;
}

.gold {
    outline:3px solid gold;
}

/* ===== LEGENDE ===== */
.legend {
    position:fixed;
    right:10px;
    top:10px;
    background:white;
    padding:5px;
    border:1px solid #aaa;
    font-size:12px;
}
</style>
</head>

<body>

<div class="papam" id="papam"></div>
<div class="legend" id="legend"></div>

<h2>Konklave</h2>

<button onclick="addCard()">+ Kandidat</button>
<div class="container" id="cards"></div>

<hr>

Papstname: <input id="papstname">

<br><br>

Wähler: <input id="total" value="120" oninput="updateThreshold()">
→ 2/3 = <span id="thresholdDisplay">80</span>

<br><br>

<button onclick="addRound()">+ Wahlgang</button>

<table>
<thead><tr id="header"><th>WG</th></tr></thead>
<tbody id="body"></tbody>
</table>

<script>

/* ===== AUSRICHTUNGEN ===== */
const colors={
ERK:"#050069",TRA:"#0500AD",KON:"#0500FF",
GKO:"#008CFF",MOD:"#FFD966",
GLI:"#FFA1A1",LIB:"#FF7575",
PRO:"#FF0000",SPR:"#B30C0C"
};

const types=Object.keys(colors);

/* ===== DATEN ===== */
let candidates=[];
let rounds=[];
let threshold=80;

/* ===== ID HELFER ===== */
function uid(){ return Date.now()+Math.random(); }

/* ===== KARTEN ===== */
function addCard(){
    const c={
        id:uid(),
        name:"Name",
        nation:"🏳️",
        age:"0",
        role:"",
        type:null
    };
    candidates.push(c);
    renderAll();
}

function removeCard(id){
    candidates=candidates.filter(c=>c.id!==id);
    renderAll();
}

function renderCards(){
    const container=document.getElementById("cards");
    container.innerHTML="";

    candidates.forEach(c=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <button class="delete-btn" onclick="removeCard(${c.id})">x</button>

        <div class="img" onclick="uploadImage(this)"></div>

        <div class="name" onclick="edit(c,'name')">${c.name}</div>

        <div class="row">
            <span onclick="edit(c,'nation')">${c.nation}</span>
            <span onclick="edit(c,'age')">${c.age}</span>
        </div>

        <div class="row">
            <span onclick="edit(c,'role')">${c.role||'Rolle'}</span>
        </div>

        <div class="type" onclick="cycleType(c,this)">
            ${c.type||'---'}
        </div>
        `;

        if(c.type) div.querySelector(".type").style.background=colors[c.type];

        container.appendChild(div);
    });
}

function edit(obj,key){
    const v=prompt(key,obj[key]);
    if(v!==null){ obj[key]=v; renderAll(); }
}

function cycleType(c,el){
    let i=types.indexOf(c.type);
    i=(i+1)%types.length;
    c.type=types[i];
    renderAll();
}

/* ===== MATRIX ===== */
function renderMatrix(){
    const header=document.getElementById("header");
    header.innerHTML="<th>WG</th>";

    candidates.forEach(c=>{
        const th=document.createElement("th");
        th.innerText=c.name;
        header.appendChild(th);
    });

    const body=document.getElementById("body");
    body.innerHTML="";

    rounds.forEach((r,i)=>{
        const tr=document.createElement("tr");

        let row=`<td>WG ${i+1}</td>`;

        candidates.forEach((c,ci)=>{
            row+=`<td>
            <input type="number" value="${r[ci]||0}"
            oninput="updateVote(${i},${ci},this.value)">
            </td>`;
        });

        tr.innerHTML=row;
        body.appendChild(tr);
    });
}

function addRound(){
    rounds.push([]);
    renderMatrix();
}

function updateVote(r,c,val){
    rounds[r][c]=Number(val);
    check();
}

function updateThreshold(){
    const total=Number(document.getElementById("total").value)||0;
    threshold=Math.ceil((2/3)*total);
    document.getElementById("thresholdDisplay").innerText=threshold;
}

/* ===== LOGIK ===== */
function check(){
    let winner=null;

    document.querySelectorAll("#body tr").forEach((row,ri)=>{
        row.querySelectorAll("input").forEach((i,ci)=>{
            i.classList.remove("gold");
            if(Number(i.value)>=threshold){
                i.classList.add("gold");
                winner=ci;
            }
        });
    });

    if(winner!==null){
        const name=candidates[winner].name;
        const papst=document.getElementById("papstname").value||"Papst ?";
        const box=document.getElementById("papam");

        box.style.display="block";
        box.innerText=`Habemus Papam: ${papst} (${name})`;
    }
}

/* ===== IMAGE ===== */
function uploadImage(div){
    const input=document.createElement("input");
    input.type="file";
    input.onchange=e=>{
        const r=new FileReader();
        r.onload=ev=>div.style.backgroundImage=`url(${ev.target.result})`;
        r.readAsDataURL(e.target.files[0]);
    };
    input.click();
}

/* ===== RENDER ===== */
function renderAll(){
    renderCards();
    renderMatrix();
}

/* START */
updateThreshold();
addCard();
addCard();
addCard();
